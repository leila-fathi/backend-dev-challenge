table:
  name: node_parents_children
  schema: public
object_relationships:
  - name: parent_node
    using:
      foreign_key_constraint_on: parent_id
  - name: child_node
    using:
      foreign_key_constraint_on: child_id
select_permissions:
  - role: user
    permission:
      columns:
        - parent_id
        - child_id
        - depth
      filter:
        child_node:
          project:
            group:
              memberships:
                user_id:
                  _eq: X-Hasura-User-Id
