table:
  name: group_memberships
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: group
    using:
      foreign_key_constraint_on: group_id
select_permissions:
  - role: user
    permission:
      columns:
        - user_id
        - group_id
        - role
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
