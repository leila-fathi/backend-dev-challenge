table:
  name: nodes
  schema: public
object_relationships:
  - name: project
    using:
      foreign_key_constraint_on: project_id
  - name: parent
    using:
      foreign_key_constraint_on: parent_id
  - name: group
    using:
      foreign_key_constraint_on: group_id
  - name: creator
    using:
      foreign_key_constraint_on: created_by
  - name: image
    using:
      foreign_key_constraint_on:
        column: file_id
        table:
          name: image_data
          schema: public
array_relationships:
  - name: children
    using:
      foreign_key_constraint_on:
        column: parent_id
        table:
          name: nodes
          schema: public
  - name: descendants
    using:
      foreign_key_constraint_on:
        column: parent_id
        table:
          name: node_parents_children
          schema: public
  - name: ancestors
    using:
      foreign_key_constraint_on:
        column: child_id
        table:
          name: node_parents_children
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - project_id
        - parent_id
        - group_id
        - created_by
        - node_type
        - name
        - created_at
      filter:
        project:
          group:
            memberships:
              user_id:
                _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - node_type:
              _eq: folder
          - group_id:
              _eq: X-Hasura-Group-Id
          - project:
              group:
                id:
                  _eq: X-Hasura-Group-Id
                memberships:
                  user_id:
                    _eq: X-Hasura-User-Id
      columns:
        - project_id
        - parent_id
        - node_type
        - name
      set:
        group_id: X-Hasura-Group-Id
        created_by: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - name
      filter:
        project:
          group:
            memberships:
              user_id:
                _eq: X-Hasura-User-Id
      check:
        project:
          group:
            memberships:
              user_id:
                _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        project:
          group:
            memberships:
              user_id:
                _eq: X-Hasura-User-Id
