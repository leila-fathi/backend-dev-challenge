table:
  name: projects
  schema: public
object_relationships:
  - name: group
    using:
      foreign_key_constraint_on: group_id
  - name: creator
    using:
      foreign_key_constraint_on: created_by
array_relationships:
  - name: nodes
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: nodes
          schema: public
  - name: folders
    using:
      manual_configuration:
        remote_table:
          name: folders
          schema: public
        column_mapping:
          id: project_id
        insertion_order: null
  - name: images
    using:
      manual_configuration:
        remote_table:
          name: images
          schema: public
        column_mapping:
          id: project_id
        insertion_order: null
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - group_id
        - name
        - created_by
        - created_at
      filter:
        group:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - group_id:
              _eq: X-Hasura-Group-Id
          - group:
              memberships:
                user_id:
                  _eq: X-Hasura-User-Id
      columns:
        - name
      set:
        group_id: X-Hasura-Group-Id
        created_by: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - name
      filter:
        group:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
      check:
        group:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        group:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
