name: hiring-challenge-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-challenge}"
      POSTGRES_USER: "${POSTGRES_USER:-challenge}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-challenge}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-challenge} -d ${POSTGRES_DB:-challenge}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8081"
      JWT_SIGNING_KEY: "${HASURA_JWT_SIGNING_KEY:-replace-with-a-very-long-random-value-1234567890}"
      JWT_CLAIMS_NAMESPACE: "${HASURA_JWT_CLAIMS_NAMESPACE:-https://challenge.example/jwt/claims}"
      ACCESS_TOKEN_TTL: "${API_ACCESS_TOKEN_TTL:-15m}"
      HASURA_GRAPHQL_URL: "http://hasura:8080/v1/graphql"
      HASURA_ADMIN_SECRET: "${HASURA_ADMIN_SECRET:-hasura-admin-secret}"
      CORS_ALLOW_ORIGINS: "${API_CORS_ALLOW_ORIGINS:-http://localhost:5173,http://localhost:8082,http://127.0.0.1:8082}"
      UPLOAD_DIR: "${API_UPLOAD_DIR:-/data/uploads}"
      THUMBNAIL_MAX_SIZE: "${API_THUMBNAIL_MAX_SIZE:-256}"
      ZITADEL_DOMAIN: "${ZITADEL_DOMAIN:-backend-dev-test-udligj.eu1.zitadel.cloud}"
      ZITADEL_BROWSER_CLIENT_ID: "${ZITADEL_BROWSER_CLIENT_ID:-366791452551825070}"
      ZITADEL_REDIRECT_URI: "${ZITADEL_REDIRECT_URI:-http://localhost:8081/api/v1/auth/callback}"
      ZITADEL_SERVICE_ACCOUNT_KEY_PATH: "${ZITADEL_SERVICE_ACCOUNT_KEY_PATH:-/run/keys/api-backend.json}"
      DATABASE_URL: "${DATABASE_URL:-postgres://challenge:challenge@postgres:5432/challenge?sslmode=disable}"
      API_SESSION_TTL: "${API_SESSION_TTL:-24h}"
    volumes:
      - ./uploads:/data/uploads
      - ./api-backend.json:/run/keys/api-backend.json:ro

  hasura:
    image: hasura/graphql-engine:v2.40.0.cli-migrations-v3
    restart: unless-stopped
    ports:
      - "${HASURA_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://${POSTGRES_USER:-challenge}:${POSTGRES_PASSWORD:-challenge}@postgres:5432/${POSTGRES_DB:-challenge}"
      HASURA_GRAPHQL_ADMIN_SECRET: "${HASURA_ADMIN_SECRET:-hasura-admin-secret}"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_ENABLE_REMOTE_SCHEMA_PERMISSIONS: "true"
      HASURA_GRAPHQL_CORS_DOMAIN: "${API_CORS_ALLOW_ORIGINS:-http://localhost:5173}"
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"${HASURA_JWT_SIGNING_KEY:-replace-with-a-very-long-random-value-1234567890}","claims_namespace":"${HASURA_JWT_CLAIMS_NAMESPACE:-https://challenge.example/jwt/claims}","claims_format":"json"}'
    volumes:
      - ./schema/metadata:/hasura-metadata
      - ./schema/migrations:/hasura-migrations

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_BACKEND_GRAPHQL_URL: "http://localhost:8081/graphql"
      VITE_HASURA_GRAPHQL_URL: "http://localhost:8080/v1/graphql"
      VITE_UPLOAD_IMAGE_URL: "http://localhost:8081/upload/image"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started
      hasura:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
